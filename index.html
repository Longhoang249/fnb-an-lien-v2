<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>fnbanlien</title>
  <link rel="icon" type="image/png" href="/logo-fnbanlien.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#3E2723" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FnBanLien" />
  <meta property="og:image" content="/logo-fnbanlien.png" />
  <!-- Preconnect to external origins (reduces DNS/TLS time) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Be Vietnam Pro — preload critical font weights to reduce LCP -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap"
    onload="this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" />
  </noscript>

  <!-- Material Icons — load async (non-blocking), icons not critical for LCP -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
    onload="this.rel='stylesheet'" />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap"
    onload="this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" />
  </noscript>

  <style>
    /* ── Theme Variables ─────────────────────────────── */
    :root,
    [data-theme="basic"] {
      --theme-bg: #f0f2f5;
      --theme-card: #ffffff;
      --theme-card-border: rgba(62, 39, 35, 0.06);
      --theme-text-primary: #3e2723;
      --theme-text-sub: rgba(62, 39, 35, 0.55);
      --theme-header-bg: rgba(240, 242, 245, 0.92);
      --theme-icon-bg: #ffffff;
      --theme-section-label: #3e2723;
      --theme-tip-bg: linear-gradient(135deg, #5D4037, #3E2723);
      --card1-bg: linear-gradient(135deg, #4A332A 0%, #3E2B23 100%);
      --card2-bg: linear-gradient(135deg, #14B8A6 0%, #0F766E 100%);
      --card3-bg: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
      --card4-bg: linear-gradient(135deg, #8B5CF6 0%, #6366F1 100%);
    }



    [data-theme="dark"] {
      --theme-bg: #0F0F0F;
      --theme-card: rgba(255, 255, 255, 0.10);
      --theme-card-border: rgba(255, 255, 255, 0.12);
      --theme-text-primary: #FFFFFF;
      --theme-text-sub: rgba(255, 255, 255, 0.55);
      --theme-header-bg: rgba(15, 15, 15, 0.92);
      --theme-icon-bg: rgba(255, 255, 255, 0.12);
      --theme-section-label: #FFFFFF;
      --theme-tip-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.06));
      --card1-bg: rgba(255, 255, 255, 0.10);
      --card2-bg: rgba(255, 255, 255, 0.10);
      --card3-bg: rgba(255, 255, 255, 0.10);
      --card4-bg: rgba(255, 255, 255, 0.10);
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background-color: var(--theme-bg);
      min-height: 100vh;
      overscroll-behavior-y: none;
      transition: background-color 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* Utility classes */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    .safe-top {
      padding-top: env(safe-area-inset-top, 20px);
    }

    .paper-texture {
      background-color: #ffffff;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%233e2723' fill-opacity='0.02' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
    }

    /* One-shot animations (no GPU loop) */
    @keyframes chatIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .animate-chat-in {
      animation: chatIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.4s ease-out;
    }

    /* Typing dots — lightweight CSS-only */
    @keyframes typingDot {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      30% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    .typing-dot {
      animation: typingDot 1.4s ease-in-out infinite;
    }

    /* Gold coin — lightweight transform */
    @keyframes coinSpin {

      0%,
      100% {
        transform: rotateY(0deg);
      }

      50% {
        transform: rotateY(180deg);
      }
    }

    .gold-coin-spin {
      display: inline-block;
      animation: coinSpin 3s ease-in-out infinite;
    }

    /* AI FAB — static shadow (no infinite animation = saves GPU) */
    .ai-fab-glow {
      box-shadow: 0 4px 20px -3px rgba(124, 58, 237, 0.5);
    }

    /* Respect user motion preferences */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>


</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
